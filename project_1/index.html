<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<style>
    body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center; 
        align-items: center;   
    }
    .maindiv{
        padding: 20px;
        background-color: #edd307;
        width:200px;
    }
    .input{
        padding:2px;
    }
    button{
        padding: 10px;
        background-color: white;
        margin-left: 60px;
        margin-top:5px;
        border-radius: 10px;
        border: black solid 1px;
        cursor: pointer;
    }
    button:hover{
    background-color: #edd307;
    color: white;
    cursor: pointer;
}
div{
    padding: 5px;;
}
span{
    color:red;
}
</style>
<body>
    <div class="maindiv">
    <h1>Registration Form</h1>
    <div>
    <b>Name</b>
    <input type="text" id="txtname" class="input" placeholder="Enter Your Name"></input>
    <span id="nameerror"></span>
    </div>
    <div>
    <b>Password</b>
    <input type="text" id="txtpassword" class="input" placeholder="Enter Password"></input>
    <span id="passworderror"></span>
    </div>
    <div>
    <b>Email</b>
    <input type="email" id="email" class="input" placeholder="Enter Your Email"></input>
    <span id="emailerror"></span>
    </div>
    <div>
        <button id="btn" disabled>Submit</button>
    </div>
    </div>
</body>
<script>
    var txtname = document.getElementById("txtname");
    var txtpassword = document.getElementById("txtpassword");
    var email = document.getElementById("email");
    var btn = document.getElementById("btn");
    var nameerror = document.getElementById("nameerror");
    var passworderror = document.getElementById("passworderror");
    var emailerror = document.getElementById("emailerror");
function validate(){
     let validated = true;

        if(txtname.value == ''){
           nameerror.textContent= 'Enter Name';
           validated=false;
        }else{
             nameerror.textContent='';
        }
        if(txtpassword.value==''||txtpassword.value.length<6){
            passworderror.textContent = 'Password must contain atleast 6 character.'
            validated=false;
        }else{
            passworderror.textContent = '';
            
        }
          var pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!pattern.test(email.value)) {
            emailerror.textContent ='Email is invalid'
            validated=false;
        }else{
            emailerror.textContent = '';
        }
          btn.disabled = !validated;
    }

   btn.addEventListener('click',function(){
    alert('Successfully Submited!');
   })
txtname.addEventListener('input',validate);
txtpassword.addEventListener('input',validate);
email.addEventListener('input',validate);
 
    
</script>
</html>
